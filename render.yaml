services:
  - type: web
    name: line-task-bot
    env: node
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_OWNER_USER_ID
        sync: false
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
